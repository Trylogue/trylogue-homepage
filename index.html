<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trylogue Apps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7C3AED;
            --primary-hover: #6D28D9;
            --secondary: #22D3EE;
            --bg-color: #0B1020;
            --text-main: #E5E7EB;
            --text-sub: #94A3B8;
            --glass-bg: rgba(16, 24, 40, 0.7);
            --shadow: 0 25px 60px -30px rgba(124, 58, 237, 0.8);
            --radius: 18px;
            --neon-border: rgba(124, 58, 237, 0.45);
            --grid-line: rgba(148, 163, 184, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }
        body::before, body::after { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: -2; }
        body::before {
            background:
                radial-gradient(circle at 15% 20%, rgba(124, 58, 237, 0.25), transparent 45%),
                radial-gradient(circle at 80% 15%, rgba(34, 211, 238, 0.2), transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(59, 130, 246, 0.2), transparent 45%);
        }
        body::after {
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            opacity: 0.35;
        }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        ul { list-style: none; }

        /* --- Header --- */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
            box-shadow: 0 12px 40px rgba(2, 8, 23, 0.55);
        }
        header h1 {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }
        .lang-switch button {
            background: none;
            border: 1px solid rgba(148, 163, 184, 0.4);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
            color: var(--text-sub);
        }
        .lang-switch button:hover { border-color: var(--secondary); color: var(--secondary); }

        /* --- Hero --- */
        #hero {
            padding: 80px 20px 50px;
            text-align: center;
        }
        .hero-content {
            max-width: 680px;
            margin: 0 auto;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .hero-content h2 {
            font-size: 2.8rem;
            line-height: 1.2;
            margin-bottom: 16px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(120deg, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-content p {
            font-size: 1.1rem;
            color: var(--text-sub);
        }

        /* --- Apps Grid --- */
        #apps {
            padding: 40px 20px 100px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 32px;
            justify-items: center;
        }
        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s;
            position: relative;
        }
        .app-card:hover { transform: translateY(-6px); }
        .app-icon {
            width: 110px;
            height: 110px;
            border-radius: 26px;
            box-shadow: 0 16px 40px rgba(2, 6, 23, 0.5), 0 0 0 1px rgba(148, 163, 184, 0.15);
            margin-bottom: 16px;
            object-fit: cover;
            background: rgba(15, 23, 42, 0.9);
            transition: box-shadow 0.3s;
        }
        .app-card:hover .app-icon {
            box-shadow: 0 20px 50px rgba(124, 58, 237, 0.45), 0 0 0 1px rgba(124, 58, 237, 0.4);
        }
        .store-badge {
            height: 36px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        .app-card:hover .store-badge { opacity: 1; }
        .app-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
            text-align: center;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 40px;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid rgba(148, 163, 184, 0.15);
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        /* --- Animations --- */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }
        .fade-in.is-visible { opacity: 1; transform: none; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Mobile --- */
        @media (max-width: 600px) {
            header { padding: 15px 20px; }
            .hero-content h2 { font-size: 2rem; }
            .app-grid { grid-template-columns: repeat(2, 1fr); gap: 24px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Trylogue</h1>
        <div class="lang-switch">
            <button onclick="setLanguage('ja')">JP</button>
            <button onclick="setLanguage('en')">EN</button>
        </div>
    </header>

    <section id="hero">
        <div class="hero-content">
            <h2 data-i18n="hero_title">Trylogueのアプリ一覧</h2>
            <p data-i18n="hero_subtitle">私たちが開発したアプリをご紹介します。</p>
        </div>
    </section>

    <section id="apps">
        <div class="app-grid">

            <a href="https://apps.apple.com/jp/app/%E3%83%8D%E3%83%A0%E3%83%AD%E3%82%B0/id6661027528" target="_blank" class="app-card fade-in">
                <img src="somninote.icon" alt="SomniNote" class="app-icon" onerror="this.src='https://placehold.co/110x110/6366F1/white?text=S'">
                <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on App Store" class="store-badge">
                <p class="app-name" data-i18n="app_somninote">SomniNote</p>
            </a>

            <a href="#" class="app-card fade-in">
                <img src="petakey.icon" alt="PetaKey" class="app-icon" onerror="this.src='https://placehold.co/110x110/F59E0B/white?text=P'">
                <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on App Store" class="store-badge">
                <p class="app-name" data-i18n="app_petakey">PetaKey</p>
            </a>

            <a href="#" class="app-card fade-in">
                <img src="focusup.icon" alt="Focus Up!!" class="app-icon" onerror="this.src='https://placehold.co/110x110/10B981/white?text=F'">
                <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on App Store" class="store-badge">
                <p class="app-name" data-i18n="app_focusup">Focus Up!!</p>
            </a>

            <a href="#" class="app-card fade-in">
                <img src="bitiron.icon" alt="BitIron" class="app-icon" onerror="this.src='https://placehold.co/110x110/EF4444/white?text=B'">
                <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on App Store" class="store-badge">
                <p class="app-name" data-i18n="app_bitiron">BitIron</p>
            </a>

            <a href="#" class="app-card fade-in">
                <img src="portai.icon" alt="PortAI" class="app-icon" onerror="this.src='https://placehold.co/110x110/3B82F6/white?text=P'">
                <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on App Store" class="store-badge">
                <p class="app-name" data-i18n="app_portai">PortAI</p>
            </a>

            <a href="#" class="app-card fade-in">
                <img src="subsmart.icon" alt="SubSmart" class="app-icon" onerror="this.src='https://placehold.co/110x110/EC4899/white?text=S'">
                <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on App Store" class="store-badge">
                <p class="app-name" data-i18n="app_subsmart">SubSmart</p>
            </a>

            <a href="#" class="app-card fade-in">
                <img src="walkevo.icon" alt="WalkEvo" class="app-icon" onerror="this.src='https://placehold.co/110x110/84CC16/white?text=W'">
                <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on App Store" class="store-badge">
                <p class="app-name" data-i18n="app_walkevo">WalkEvo</p>
            </a>

        </div>
    </section>

    <footer>
        <p>&copy; 2025 Trylogue. All rights reserved.</p>
    </footer>

    <script>
        const translations = {
            ja: {
                hero_title: "Trylogueのアプリ一覧",
                hero_subtitle: "私たちが開発したアプリをご紹介します。",
                app_somninote: "SomniNote",
                app_petakey: "PetaKey",
                app_focusup: "Focus Up!!",
                app_bitiron: "BitIron",
                app_portai: "PortAI",
                app_subsmart: "SubSmart",
                app_walkevo: "WalkEvo"
            },
            en: {
                hero_title: "Apps by Trylogue",
                hero_subtitle: "A collection of apps we've crafted.",
                app_somninote: "SomniNote",
                app_petakey: "PetaKey",
                app_focusup: "Focus Up!!",
                app_bitiron: "BitIron",
                app_portai: "PortAI",
                app_subsmart: "SubSmart",
                app_walkevo: "WalkEvo"
            }
        };

        function setLanguage(lang) {
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key] !== undefined) {
                    el.innerText = translations[lang][key];
                }
            });
        }

        const observer = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    obs.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        window.addEventListener("DOMContentLoaded", () => setLanguage("en"));
    </script>
</body>
</html>
